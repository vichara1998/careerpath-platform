spring.application.name=careerpath-backend


# CareerPath Sri Lanka  Backend Config

server.port=8080

# --- Database (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/careerpath_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

